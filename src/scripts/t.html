<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section class="new-story__header">
      <div class="container">
        <h1 class="new-story__header__title">Buat Cerita Baru</h1>
        <p class="new-story__header__description">
          Unggah cerita menarik Anda yang terjadi di sekitar.
        </p>
      </div>
    </section>

    <section class="new-story__content container">
      <form id="new-story-form" class="new-form">
        <div class="form-control">
          <label for="description-input">Deskripsi Cerita</label>
          <textarea
            name="description"
            id="description-input"
            placeholder="Tulis cerita Anda... "
            required
          ></textarea>
        </div>

        <div class="form-control">
          <label for="photo-input" class="new-form__documentation__title">Foto Cerita</label>
          <div id="documentation-more-info" class="new-form__help">
            Anda dapat menyertakan foto sebagai dokumentasi. Maksimal ukuran 1MB.
          </div>

          <div class="new-form__documentation__container">
            <input
              type="file"
              name="documentation"
              id="photo-input"
              accept="image/*"
              aria-describedby="photo-input-more-info"
              hidden
            />

            <div class="documentation__actions">
              <button type="button" id="gallery-button" class="btn btn-outline btn-outline-primary">
                Pilih dari Galeri
              </button>

              <button type="button" id="camera-button" class="btn btn-outline btn-outline-primary">
                Buka Kamera
              </button>
            </div>

            <div id="camera-container" class="new-form__camera__container hidden">
              <video id="camera-video" class="new-form__camera__video">
                Video stream not available.
              </video>
              <canvas id="camera-canvas" class="new-form__camera__canvas"></canvas>

              <div class="new-form__camera__tools">
                <select id="camera-select"></select>
                <div class="new-form__camera__tools__buttons">
                  <button type="button" id="camera-take-button" class="btn btn-primary">
                    Ambil Foto
                  </button>
                  <button type="button" id="camera-close-button" class="btn btn-danger">
                    Tutup Kamera
                  </button>
                </div>
              </div>

              <div
                id="documentation-preview"
                class="new-form__documentation__preview"
                aria-live="polite"
              ></div>
            </div>
          </div>
        </div>

        <div class="form-control">
          <label for="map" class="new-form__location__title">Lokasi</label>
          <p id="map-more-info" class="new-form__help">Klik pada peta untuk menentukan lokasi.</p>
          <div id="map" class="new-form__map__container" aria-describedby="map-more-info"></div>
        </div>

        <div class="form-row">
          <div class="form-control">
            <label for="lat">Latitude</label>
            <input type="text" name="lat" id="lat" readonly required />
          </div>

          <div class="form-control">
            <label for="lon">Longitude</label>
            <input type="text" name="lon" id="lon" readonly required />
          </div>
        </div>

        <div class="new-form__actions">
          <button type="submit" class="btn btn-primary btn-block">Kirim Cerita</button>
        </div>
      </form>
    </section>
  </body>
</html>
